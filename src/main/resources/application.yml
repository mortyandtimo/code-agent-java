server:
  port: ${SERVER_PORT:18081}

spring:
  application:
    name: code-agent-java
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/code_agent_java?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:CHANGE_ME}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    locations: classpath:db/migration

code-agent:
  llm:
    base-url: ${CODE_AGENT_LLM_BASE_URL:https://api.openai.com/v1}
    api-key: ${CODE_AGENT_API_KEY:}
    model: ${CODE_AGENT_LLM_MODEL:gpt-4o-mini}
    timeout-seconds: ${CODE_AGENT_LLM_TIMEOUT_SECONDS:90}
    max-retries: ${CODE_AGENT_LLM_MAX_RETRIES:2}
    initial-backoff-millis: ${CODE_AGENT_LLM_INITIAL_BACKOFF_MILLIS:1500}
    max-backoff-millis: ${CODE_AGENT_LLM_MAX_BACKOFF_MILLIS:8000}
  shell:
    timeout-seconds: ${CODE_AGENT_SHELL_TIMEOUT_SECONDS:30}
  cli:
    enabled: ${CODE_AGENT_CLI_ENABLED:true}
